                                <div className="text-center px-3 border-r border-stone-300/60">
                                    <span className="block text-xl font-bold text-amber-700">{totalNotesWritten} / 5</span>
                                    <span className="text-[11px] text-stone-500 font-semibold uppercase">Notes Saved</span>
                                </div>
                                <div className="text-center px-3">
                                    <span className="block text-xl font-bold text-emerald-700">{scoreCount} / {FLASHCARDS.length}</span>
                                    <span className="text-[11px] text-stone-500 font-semibold uppercase">Cards Rated</span>
                                </div>
                            </div>
                        </div>

                        {/* Navigation Tabs */}
                        <div className="flex flex-wrap gap-2 mt-8 pt-6 border-t border-stone-100">
                            <button 
                                onClick={() => setActiveTab('mindmap')}
                                className={`px-5 py-2.5 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center gap-2 ${
                                    activeTab === 'mindmap' 
                                    ? 'bg-amber-900 text-white shadow-md shadow-amber-900/10' 
                                    : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                                }`}
                            >
                                🧠 Visual Knowledge Map & Notes
                            </button>
                            <button 
                                onClick={() => setActiveTab('flashcards')}
                                className={`px-5 py-2.5 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center gap-2 ${
                                    activeTab === 'flashcards' 
                                    ? 'bg-amber-900 text-white shadow-md shadow-amber-900/10' 
                                    : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                                }`}
                            >
                                🎴 Active Recall Flashcards
                            </button>
                            <button 
                                onClick={() => setActiveTab('practice')}
                                className={`px-5 py-2.5 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center gap-2 ${
                                    activeTab === 'practice' 
                                    ? 'bg-amber-900 text-white shadow-md shadow-amber-900/10' 
                                    : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                                }`}
                            >
                                ✍️ Interactive Practice Suite
                            </button>
                            <button 
                                onClick={() => setActiveTab('summary')}
                                className={`px-5 py-2.5 rounded-xl font-semibold text-sm transition-all duration-200 flex items-center gap-2 ${
                                    activeTab === 'summary' 
                                    ? 'bg-amber-900 text-white shadow-md shadow-amber-900/10' 
                                    : 'bg-stone-100 text-stone-700 hover:bg-stone-200'
                                }`}
                            >
                                📊 Note Overview & Mastery
                            </button>
                        </div>
                    </header>

                    {/* TAB 1: VISUAL MIND MAP & KNOWLEDGE CARDS */}
                    {activeTab === 'mindmap' && (
                        <div className="space-y-8">
                            {/* Filter Bar */}
                            <div className="flex flex-wrap items-center justify-between gap-4 bg-white p-4 rounded-2xl card-shadow border border-stone-200">
                                <div className="flex items-center gap-2">
                                    <span className="text-xs font-bold text-stone-500 uppercase tracking-wider">English Category Filter:</span>
                                    <div className="flex flex-wrap gap-1.5">
                                        {['All', 'Comparing Adjectives', 'Comparing Adverbs', 'Other Ways of Comparing', 'Comparing Quantities', 'Grammar Extra: Comparing Nouns'].map(cat => (
                                            <button
                                                key={cat}
                                                onClick={() => setCardFilter(cat)}
                                                className={`px-3 py-1 rounded-lg text-xs font-semibold transition-all ${
                                                    cardFilter === cat
                                                    ? 'bg-stone-900 text-white'
                                                    : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                                                }`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <span className="text-xs text-stone-400 font-medium">Showing {filteredModules.length} Grammar Modules</span>
                            </div>

                            {/* Grammar Modules Loop */}
                            {filteredModules.map((module) => (
                                <section key={module.id} className="bg-white rounded-3xl p-6 sm:p-8 card-shadow border border-stone-200 space-y-6">
                                    {/* Module Header */}
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-stone-100 pb-5">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className={`px-2.5 py-0.5 rounded-full text-xs font-extrabold uppercase border ${module.badgeColor}`}>
                                                    Section {module.sectionNumber}
                                                </span>
                                                <span className="text-xs font-semibold text-stone-400 uppercase tracking-wider">
                                                    English Keyword Label: <strong className="text-stone-700">{module.tag}</strong>
                                                </span>
                                            </div>
                                            <h2 className="text-2xl font-bold font-display text-stone-900">
                                                {module.englishCategory}
                                            </h2>
                                        </div>
                                    </div>

                                    {/* Native Logic Visual Breakdown */}
                                    <div className={`p-5 sm:p-6 rounded-2xl border ${module.borderColor} ${module.accentBg} space-y-3`}>
                                        <div className="flex items-center gap-2">
                                            <span className="text-lg">💡</span>
                                            <h3 className="font-bold text-stone-900 text-base">
                                                {module.nativeLogic.title}
                                            </h3>
                                        </div>
                                        <p className="text-stone-700 text-sm leading-relaxed font-medium">
                                            {module.nativeLogic.coreConcept}
                                        </p>
                                        <div className="bg-white/80 backdrop-blur-sm p-3.5 rounded-xl border border-stone-200/60 font-mono text-xs text-stone-800 whitespace-pre-line">
                                            {module.nativeLogic.visualMetaphor}
                                        </div>
                                        <div className="pt-2">
                                            <span className="text-xs font-bold text-stone-600 uppercase tracking-wider block mb-1.5">Native Intuition Key Points:</span>
                                            <ul className="list-disc list-inside space-y-1 text-xs text-stone-700">
                                                {module.nativeLogic.keyInsights.map((insight, idx) => (
                                                    <li key={idx}><span className="font-medium">{insight}</span></li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>

                                    {/* Grammar Tables */}
                                    {module.tables && module.tables.map((tbl, idx) => (
                                        <div key={idx} className="space-y-3">
                                            <h4 className="font-bold text-sm text-stone-800 flex items-center gap-2">
                                                <span className="w-2 h-2 rounded-full bg-amber-500"></span>
                                                {tbl.title}
                                            </h4>
                                            <div className="overflow-x-auto rounded-2xl border border-stone-200">
                                                <table className="w-full text-left border-collapse text-sm">
                                                    <thead>
                                                        <tr className="bg-stone-100 text-stone-700 font-bold border-b border-stone-200 text-xs uppercase tracking-wider">
                                                            {tbl.headers.map((h, i) => (
                                                                <th key={i} className="p-3.5">{h}</th>
                                                            ))}
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-stone-100 font-medium">
                                                        {tbl.rows.map((row, rIdx) => (
                                                            <tr key={rIdx} className="hover:bg-cream-50/60 transition-colors">
                                                                <td className="p-3.5 font-semibold text-stone-900 bg-stone-50/50">{row.type}</td>
                                                                <td className="p-3.5 text-amber-900 font-semibold">{row.comp}</td>
                                                                <td className="p-3.5 text-purple-900 font-semibold">{row.sup}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    ))}

                                    {/* Subsections & Detailed Rules */}
                                    <div className="space-y-5 pt-2">
                                        {module.subsections.map((sub, sIdx) => (
                                            <div key={sIdx} className="bg-cream-50/50 p-5 rounded-2xl border border-cream-200 space-y-4">
                                                <div className="flex items-center justify-between">
                                                    <h4 className="font-bold text-stone-900 text-base">
                                                        {sub.title}
                                                    </h4>
                                                    <span className="text-xs font-semibold px-2.5 py-1 bg-stone-200 text-stone-700 rounded-lg">
                                                        Keyword: {sub.englishKeyword}
                                                    </span>
                                                </div>

                                                <div className="space-y-3">
                                                    {sub.rules.map((rule, rIdx) => (
                                                        <div key={rIdx} className="space-y-2">
                                                            {rule.isWarning ? (
                                                                <div className="p-3.5 bg-rose-50 border border-rose-200 rounded-xl text-xs sm:text-sm text-rose-900 font-semibold flex items-start gap-2">
                                                                    <span className="text-base">⚠️</span>
                                                                    <div>
                                                                        <strong>{rule.textWarning}</strong>
                                                                        <div className="mt-1 font-mono text-xs text-rose-800">
                                                                            {rule.examples.map((ex, exI) => (
                                                                                <div key={exI}>{ex}</div>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <p className="text-sm font-semibold text-stone-800">
                                                                    {rule.text}
                                                                </p>
                                                            )}

                                                            {rule.bulletPoints && (
                                                                <div className="ml-4 space-y-2">
                                                                    {rule.bulletPoints.map((bp, bIdx) => (
                                                                        <div key={bIdx} className="bg-white p-3 rounded-xl border border-stone-200 text-xs sm:text-sm">
                                                                            <span className="font-bold text-stone-900 block mb-1">
                                                                                🔹 {bp.label}
                                                                            </span>
                                                                            {bp.examples.map((ex, eIdx) => (
                                                                                <p key={eIdx} className="italic text-stone-600 ml-4 font-mono">
                                                                                    "{ex}"
                                                                                </p>
                                                                            ))}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}

                                                            {rule.examples && !rule.isWarning && (
                                                                <div className="ml-2 space-y-1">
                                                                    {rule.examples.map((ex, eIdx) => (
                                                                        <div key={eIdx} className="flex items-start gap-2 text-xs sm:text-sm font-mono text-amber-900 bg-amber-50/60 px-3 py-1.5 rounded-lg border border-amber-100">
                                                                            <span className="text-amber-500 font-bold">👉</span>
                                                                            <span>{ex}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* MANDATORY USER NOTE BOX */}
                                    <div className="pt-4 border-t border-stone-100">
                                        <div className="flex items-center justify-between mb-2">
                                            <label className="text-xs font-extrabold text-stone-700 uppercase tracking-wider flex items-center gap-1.5">
                                                <span>📝</span>
                                                <span>Your Personal Learner Notes for Section {module.sectionNumber}</span>
                                            </label>
                                            <span className="text-[11px] text-stone-400 font-medium">Auto-saves locally</span>
                                        </div>
                                        <textarea
                                            rows="3"
                                            value={userNotes[module.id] || ''}
                                            onChange={(e) => handleNoteChange(module.id, e.target.value)}
                                            placeholder={`Write your personal memory hooks, extra examples, or native logic reminders for ${module.englishCategory}...`}
                                            className="w-full p-3.5 bg-cream-50/70 rounded-2xl border border-cream-200 focus:bg-white focus:border-amber-400 focus:ring-2 focus:ring-amber-200 outline-none text-sm text-stone-800 placeholder-stone-400 transition-all font-sans"
                                        ></textarea>
                                    </div>
                                </section>
                            ))}
                        </div>
                    )}

                    {/* TAB 2: ACTIVE RECALL FLASHCARDS */}
                    {activeTab === 'flashcards' && (
                        <div className="max-w-3xl mx-auto space-y-6">
                            <div className="bg-white rounded-3xl p-6 sm:p-8 card-shadow border border-stone-200 text-center space-y-6">
                                <div className="flex items-center justify-between">
                                    <span className="text-xs font-bold px-3 py-1 bg-amber-100 text-amber-900 rounded-full">
                                        Card {currentFcIndex + 1} of {FLASHCARDS.length}
                                    </span>
                                    <span className="text-xs font-semibold text-stone-500">
                                        Category: <strong className="text-stone-800">{FLASHCARDS[currentFcIndex].category}</strong>
                                    </span>
                                </div>

                                {/* Flashcard Flip Interface */}
                                <div 
                                    onClick={() => setIsFlipped(!isFlipped)}
                                    className={`min-h-[260px] p-8 rounded-3xl border-2 transition-all cursor-pointer flex flex-col items-center justify-center text-center relative ${
                                        isFlipped 
                                        ? 'bg-amber-50/60 border-amber-300 text-stone-900' 
                                        : 'bg-white border-stone-200 hover:border-amber-300 hover:shadow-lg'
                                    }`}
                                >
                                    {!isFlipped ? (
                                        <div className="space-y-4">
                                            <span className="text-xs font-bold uppercase tracking-wider text-amber-700 bg-amber-100 px-3 py-1 rounded-md">
                                                Active Recall Prompt
                                            </span>
                                            <h3 className="text-xl sm:text-2xl font-extrabold font-display text-stone-900">
                                                {FLASHCARDS[currentFcIndex].question}
                                            </h3>
                                            <p className="text-xs text-stone-400 font-medium italic">
                                                💡 Hint: {FLASHCARDS[currentFcIndex].hint}
                                            </p>
                                            <p className="text-xs font-semibold text-amber-800 pt-4">
                                                (Click card to reveal Native Answer & Logic)
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            <span className="text-xs font-bold uppercase tracking-wider text-emerald-800 bg-emerald-100 px-3 py-1 rounded-md">
                                                Native Logic Explanation
                                            </span>
                                            <p className="text-base sm:text-lg font-semibold text-stone-800 whitespace-pre-line text-left leading-relaxed">
                                                {FLASHCARDS[currentFcIndex].answer}
                                            </p>
                                        </div>
                                    )}
                                </div>

                                {/* Confidence Self-Rating */}
                                {isFlipped && (
                                    <div className="pt-4 border-t border-stone-100 space-y-3">
                                        <span className="text-xs font-bold uppercase text-stone-500 tracking-wider block">
                                            Rate your Active Recall Confidence:
                                        </span>
                                        <div className="flex justify-center gap-3">
                                            <button
                                                onClick={() => {
                                                    setConfidenceScores({ ...confidenceScores, [FLASHCARDS[currentFcIndex].id]: 'Hard' });
                                                    if (currentFcIndex < FLASHCARDS.length - 1) {
                                                        setCurrentFcIndex(currentFcIndex + 1);
                                                        setIsFlipped(false);
                                                    }
                                                }}
                                                className="px-4 py-2 bg-rose-100 hover:bg-rose-200 text-rose-900 text-xs font-bold rounded-xl transition-all"
                                            >
                                                😓 Hard (Review Soon)
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setConfidenceScores({ ...confidenceScores, [FLASHCARDS[currentFcIndex].id]: 'Medium' });
                                                    if (currentFcIndex < FLASHCARDS.length - 1) {
                                                        setCurrentFcIndex(currentFcIndex + 1);
                                                        setIsFlipped(false);
                                                    }
                                                }}
                                                className="px-4 py-2 bg-amber-100 hover:bg-amber-200 text-amber-900 text-xs font-bold rounded-xl transition-all"
                                            >
                                                🤔 Medium
                                            </button>
                                            <button
                                                onClick={() => {
                                                    setConfidenceScores({ ...confidenceScores, [FLASHCARDS[currentFcIndex].id]: 'Easy' });
                                                    if (currentFcIndex < FLASHCARDS.length - 1) {
                                                        setCurrentFcIndex(currentFcIndex + 1);
                                                        setIsFlipped(false);
                                                    }
                                                }}
                                                className="px-4 py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-900 text-xs font-bold rounded-xl transition-all"
                                            >
                                                🎉 Easy (Mastered)
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {/* Controls */}
                                <div className="flex items-center justify-between pt-2">
                                    <button
                                        disabled={currentFcIndex === 0}
                                        onClick={() => {
                                            setCurrentFcIndex(currentFcIndex - 1);
                                            setIsFlipped(false);
                                        }}
                                        className="px-4 py-2 rounded-xl bg-stone-100 hover:bg-stone-200 text-stone-700 text-xs font-bold disabled:opacity-40"
                                    >
                                        ← Previous Card
                                    </button>
                                    <button
                                        disabled={currentFcIndex === FLASHCARDS.length - 1}
                                        onClick={() => {
                                            setCurrentFcIndex(currentFcIndex + 1);
                                            setIsFlipped(false);
                                        }}
                                        className="px-4 py-2 rounded-xl bg-stone-900 text-white text-xs font-bold hover:bg-stone-800 disabled:opacity-40"
                                    >
                                        Next Card →
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TAB 3: INTERACTIVE PRACTICE SUITE */}
                    {activeTab === 'practice' && (
                        <div className="max-w-4xl mx-auto space-y-6">
                            <div className="bg-white rounded-3xl p-6 sm:p-8 card-shadow border border-stone-200 space-y-6">
                                <div>
                                    <h2 className="text-2xl font-bold font-display text-stone-900">
                                        Grammar Mastery Practice
                                    </h2>
                                    <p className="text-sm text-stone-500 mt-1">
                                        Test your recall against precise native grammar rules extracted from your uploaded images.
                                    </p>
                                </div>

                                <div className="space-y-6">
                                    {PRACTICE_QUESTIONS.map((q, qIdx) => (
                                        <div key={q.id} className="p-5 rounded-2xl bg-cream-50/50 border border-cream-200 space-y-3">
                                            <div className="flex items-center justify-between">
                                                <span className="text-xs font-extrabold px-2.5 py-0.5 bg-stone-200 text-stone-700 rounded-md uppercase">
                                                    Question {qIdx + 1} • {q.englishLabel}
                                                </span>
                                            </div>

                                            <p className="text-base font-bold text-stone-900">
                                                {q.question}
                                            </p>

                                            <div className="grid grid-cols-1 gap-2 pt-2">
                                                {q.options.map((opt, oIdx) => {
                                                    const isSelected = userAnswers[q.id] === oIdx;
                                                    const isCorrect = q.correct === oIdx;
                                                    let btnStyle = 'bg-white border-stone-200 text-stone-800 hover:border-amber-300';

                                                    if (quizSubmitted) {
                                                        if (isCorrect) btnStyle = 'bg-emerald-100 border-emerald-400 text-emerald-900 font-bold';
                                                        else if (isSelected) btnStyle = 'bg-rose-100 border-rose-400 text-rose-900 font-bold';
                                                    } else if (isSelected) {
                                                        btnStyle = 'bg-amber-100 border-amber-400 text-amber-900 font-bold';
                                                    }

                                                    return (
                                                        <button
                                                            key={oIdx}
                                                            disabled={quizSubmitted}
                                                            onClick={() => setUserAnswers({ ...userAnswers, [q.id]: oIdx })}
                                                            className={`w-full text-left p-3.5 rounded-xl border text-sm transition-all flex items-center justify-between ${btnStyle}`}
                                                        >
                                                            <span>{opt}</span>
                                                            {quizSubmitted && isCorrect && <span>✅</span>}
                                                            {quizSubmitted && isSelected && !isCorrect && <span>❌</span>}
                                                        </button>
                                                    );
                                                })}
                                            </div>

                                            {quizSubmitted && (
                                                <div className="p-3 bg-white rounded-xl border border-stone-200 text-xs text-stone-700">
                                                    <strong className="text-stone-900">Native Explanation:</strong> {q.explanation}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>

                                <div className="pt-4 border-t border-stone-100 flex justify-end gap-3">
                                    {!quizSubmitted ? (
                                        <button
                                            onClick={() => setQuizSubmitted(true)}
                                            className="px-6 py-3 bg-amber-900 hover:bg-amber-800 text-white font-bold text-sm rounded-xl transition-all shadow-md"
                                        >
                                            Submit & Verify Answers
                                        </button>
                                    ) : (
                                        <button
                                            onClick={() => {
                                                setQuizSubmitted(false);
                                                setUserAnswers({});
                                            }}
                                            className="px-6 py-3 bg-stone-800 hover:bg-stone-700 text-white font-bold text-sm rounded-xl transition-all"
                                        >
                                            Try Again
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TAB 4: PERSONAL NOTES OVERVIEW & MASTERY DASHBOARD */}
                    {activeTab === 'summary' && (
                        <div className="space-y-6">
                            <div className="bg-white rounded-3xl p-6 sm:p-8 card-shadow border border-stone-200 space-y-6">
                                <div className="flex items-center justify-between border-b border-stone-100 pb-4">
                                    <div>
                                        <h2 className="text-2xl font-bold font-display text-stone-900">
                                            Personal Visual Study Notes Summary
                                        </h2>
                                        <p className="text-sm text-stone-500 mt-0.5">
                                            Consolidated custom notes written for each section.
                                        </p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {GRAMMAR_DATA.map((module) => (
                                        <div key={module.id} className="p-5 rounded-2xl bg-cream-50/70 border border-cream-200 space-y-3">
                                            <div className="flex items-center justify-between">
                                                <span className="text-xs font-bold text-stone-800">
                                                    Section {module.sectionNumber}: {module.englishCategory}
                                                </span>
                                                <span className="text-[11px] font-semibold px-2 py-0.5 bg-stone-200 rounded text-stone-600">
                                                    {module.tag}
                                                </span>
                                            </div>

                                            <div className="bg-white p-3.5 rounded-xl border border-stone-200/80 min-h-[90px] text-xs text-stone-700 whitespace-pre-wrap">
                                                {userNotes[module.id] && userNotes[module.id].trim().length > 0 ? (
                                                    userNotes[module.id]
                                                ) : (
                                                    <span className="text-stone-400 italic">No custom notes written for this section yet. Go to the Knowledge Map tab to add notes!</span>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
